<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StyleHub – Shoes, Gadgets & Dresses</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --surface2: #1f1f1f;
      --border: rgba(255,255,255,0.07);
      --accent: #c8a96e;
      --accent2: #e8c99e;
      --text: #f0ece4;
      --muted: #888;
      --radius: 16px;
      --transition: 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ── Noise texture overlay ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    /* ── HEADER ── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(13,13,13,0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 1.2rem 2.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-brand {
      display: flex;
      flex-direction: column;
      gap: 0.1rem;
    }

    .header-brand h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      font-weight: 900;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header-brand p {
      font-size: 0.72rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 300;
    }

    .header-cart {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 30px;
      padding: 0.5rem 1.1rem;
      font-size: 0.82rem;
      color: var(--muted);
      cursor: pointer;
      transition: border-color var(--transition), color var(--transition);
    }

    .header-cart:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ── HERO STRIP ── */
    .hero {
      text-align: center;
      padding: 4rem 2rem 2rem;
      position: relative;
      z-index: 1;
    }

    .hero-tag {
      display: inline-block;
      font-size: 0.7rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--accent);
      border: 1px solid var(--accent);
      border-radius: 30px;
      padding: 0.3rem 0.9rem;
      margin-bottom: 1.2rem;
      animation: fadeUp 0.6s ease both;
    }

    .hero h2 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.2rem, 5vw, 4rem);
      font-weight: 900;
      line-height: 1.1;
      letter-spacing: -1px;
      animation: fadeUp 0.6s 0.1s ease both;
    }

    .hero h2 em {
      font-style: italic;
      color: var(--accent);
    }

    .hero p {
      color: var(--muted);
      margin-top: 0.9rem;
      font-size: 0.95rem;
      font-weight: 300;
      animation: fadeUp 0.6s 0.2s ease both;
    }

    /* ── FILTERS ── */
    .filters-wrapper {
      display: flex;
      justify-content: center;
      gap: 0.6rem;
      padding: 2rem 1rem 1.5rem;
      flex-wrap: wrap;
      position: relative;
      z-index: 1;
    }

    .filter-btn {
      padding: 0.55rem 1.5rem;
      border: 1px solid var(--border);
      border-radius: 30px;
      background: var(--surface);
      color: var(--muted);
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 0.03em;
      transition: all var(--transition);
    }

    .filter-btn:hover {
      border-color: var(--accent);
      color: var(--text);
    }

    .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #0d0d0d;
      font-weight: 600;
    }

    /* ── MAIN GRID ── */
    main {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 1.5rem 5rem;
      position: relative;
      z-index: 1;
    }

    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1.5rem;
    }

    /* ── PRODUCT CARD ── */
    .product-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      text-decoration: none;
      color: var(--text);
      display: flex;
      flex-direction: column;
      transition: transform var(--transition), border-color var(--transition), box-shadow var(--transition);
      animation: fadeUp 0.5s ease both;
    }

    .product-card:hover {
      transform: translateY(-6px);
      border-color: rgba(200,169,110,0.3);
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    }

    .product-card:hover .product-img {
      transform: scale(1.05);
    }

    .img-wrap {
      overflow: hidden;
      height: 220px;
      background: var(--surface2);
      position: relative;
    }

    .product-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .product-img-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      color: var(--border);
    }

    .product-badge {
      position: absolute;
      top: 0.75rem;
      left: 0.75rem;
      background: rgba(200,169,110,0.15);
      border: 1px solid rgba(200,169,110,0.3);
      border-radius: 20px;
      padding: 0.2rem 0.65rem;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      backdrop-filter: blur(6px);
    }

    .product-info {
      padding: 1.1rem 1.2rem 1.3rem;
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      flex: 1;
    }

    .product-name {
      font-weight: 600;
      font-size: 0.97rem;
      line-height: 1.3;
    }

    .product-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 0.6rem;
    }

    .product-price {
      font-weight: 700;
      font-size: 1.05rem;
      color: var(--accent);
    }

    .product-cta {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--surface2);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      transition: background var(--transition), border-color var(--transition);
    }

    .product-card:hover .product-cta {
      background: var(--accent);
      border-color: var(--accent);
    }

    /* ── STATES ── */
    .state-container {
      grid-column: 1 / -1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 5rem 1rem;
      gap: 1rem;
      color: var(--muted);
    }

    /* Skeleton loader */
    .skeleton-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      animation: pulse 1.6s ease-in-out infinite;
    }

    .skeleton-img {
      height: 220px;
      background: var(--surface2);
    }

    .skeleton-body {
      padding: 1.1rem 1.2rem;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .skeleton-line {
      height: 12px;
      border-radius: 6px;
      background: var(--surface2);
    }

    .skeleton-line.short { width: 40%; }
    .skeleton-line.medium { width: 65%; }
    .skeleton-line.full { width: 100%; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* ── ERROR ── */
    .error-state {
      text-align: center;
      padding: 4rem 1rem;
    }

    .error-state .icon { font-size: 2.5rem; margin-bottom: 0.8rem; }
    .error-state h3 { font-size: 1.1rem; color: var(--text); margin-bottom: 0.4rem; }
    .error-state p { font-size: 0.9rem; color: var(--muted); }

    .retry-btn {
      margin-top: 1.2rem;
      padding: 0.6rem 1.5rem;
      border-radius: 30px;
      border: 1px solid var(--accent);
      background: transparent;
      color: var(--accent);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background var(--transition), color var(--transition);
    }

    .retry-btn:hover { background: var(--accent); color: #0d0d0d; }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      padding: 2rem;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.82rem;
      letter-spacing: 0.05em;
      position: relative;
      z-index: 1;
    }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      header { padding: 1rem 1.2rem; }
      .hero { padding: 2.5rem 1rem 1.5rem; }
      .products-grid { grid-template-columns: repeat(auto-fill, minmax(155px, 1fr)); gap: 1rem; }
      .img-wrap { height: 170px; }
    }
  </style>
</head>

<body>

<header>
  <div class="header-brand">
    <h1>StyleHub</h1>
    <p>Shoes · Gadgets · Dresses</p>
  </div>
  <div class="header-cart" role="button" aria-label="Shopping cart">
    🛍 Cart
  </div>
</header>

<section class="hero">
  <span class="hero-tag">New Arrivals 2026</span>
  <h2>Curated for <em>your</em> style</h2>
  <p>Shoes, gadgets, and dresses — handpicked and delivered.</p>
</section>

<div class="filters-wrapper" role="group" aria-label="Product category filters">
  <button class="filter-btn active" data-category="all">All</button>
  <button class="filter-btn" data-category="shoes">👟 Shoes</button>
  <button class="filter-btn" data-category="gadgets">⚡ Gadgets</button>
  <button class="filter-btn" data-category="dresses">👗 Dresses</button>
</div>

<main>
  <div class="products-grid" id="products" role="list" aria-live="polite" aria-label="Product listings"></div>
</main>

<footer>
  &copy; 2026 StyleHub — All rights reserved
</footer>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function () {

  /* ── Firebase init ── */
  const firebaseConfig = {
    apiKey: "AIzaSyDDyJw-dYYcd1i02YVBkrTrqD01tF--w00",
    authDomain: "stylehub-7fb69.firebaseapp.com",
    projectId: "stylehub-7fb69",
    storageBucket: "stylehub-7fb69.firebasestorage.app",
    messagingSenderId: "1051134155130",
    appId: "1:1051134155130:web:39dfb1b9171b7911c15ec3",
    measurementId: "G-LZNG900PQ4"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  const container  = document.getElementById("products");
  let   currentCategory = "all";
  let   isLoading       = false;   // FIX: guard against concurrent renders

  /* ── Skeleton placeholders while loading ── */
  function showSkeletons(count = 8) {
    container.innerHTML = Array.from({ length: count }, () => `
      <div class="skeleton-card" aria-hidden="true">
        <div class="skeleton-img"></div>
        <div class="skeleton-body">
          <div class="skeleton-line full"></div>
          <div class="skeleton-line medium"></div>
          <div class="skeleton-line short" style="margin-top:.4rem"></div>
        </div>
      </div>`).join("");
  }

  /* ── Category icon helper ── */
  function categoryIcon(cat) {
    return { shoes: "👟", gadgets: "⚡", dresses: "👗" }[cat] || "✨";
  }

  /* ── Safe price formatter — FIX: guard NaN ── */
  function formatPrice(raw) {
    const n = Number(raw);
    return isNaN(n) ? "—" : "$" + n.toFixed(2);
  }

  /* ── Fetch from Firestore ── */
  async function loadProducts() {
    const snapshot = await db.collection("stylehub_products").get();
    const products = [];
    snapshot.forEach(doc => products.push({ id: doc.id, ...doc.data() }));
    return products;
  }

  /* ── Render ── */
  async function renderProducts(category = "all") {
    if (isLoading) return;   // FIX: debounce rapid filter clicks
    isLoading = true;

    showSkeletons();

    try {
      const products = await loadProducts();

      const filtered = category === "all"
        ? products
        : products.filter(p => p.category === category);

      container.innerHTML = "";

      if (filtered.length === 0) {
        container.innerHTML = `
          <div class="state-container">
            <span style="font-size:2.5rem">🔍</span>
            <p>No products found in this category.</p>
          </div>`;
        return;
      }

      filtered.forEach((product, i) => {
        // FIX: guard missing images array
        const imgSrc = Array.isArray(product.images) && product.images.length
          ? product.images[0]
          : null;

        const card = document.createElement("a");
        card.href    = `product.html?id=${encodeURIComponent(product.id)}`;
        card.target  = "_blank";
        card.rel     = "noopener noreferrer";   // FIX: security — prevent tab hijack
        card.classList.add("product-card");
        card.setAttribute("role", "listitem");
        card.setAttribute("aria-label", `${product.name}, ${formatPrice(product.price)}`);
        card.style.animationDelay = `${i * 0.06}s`;

        card.innerHTML = `
          <div class="img-wrap">
            ${imgSrc
              ? `<img class="product-img" src="${imgSrc}" alt="${product.name || 'Product image'}" loading="lazy" />`
              : `<div class="product-img-placeholder" aria-hidden="true">${categoryIcon(product.category)}</div>`
            }
            <span class="product-badge">${categoryIcon(product.category)} ${product.category || "item"}</span>
          </div>
          <div class="product-info">
            <div class="product-name">${product.name || "Unnamed product"}</div>
            <div class="product-footer">
              <span class="product-price">${formatPrice(product.price)}</span>
              <span class="product-cta" aria-hidden="true">→</span>
            </div>
          </div>`;

        container.appendChild(card);
      });

    } catch (err) {
      // FIX: surface errors instead of silent failure
      console.error("Failed to load products:", err);
      container.innerHTML = `
        <div class="error-state state-container">
          <div class="icon">⚠️</div>
          <h3>Couldn't load products</h3>
          <p>Check your connection and try again.</p>
          <button class="retry-btn" id="retry-btn">Retry</button>
        </div>`;

      document.getElementById("retry-btn")?.addEventListener("click", () => {
        isLoading = false;
        renderProducts(currentCategory);
      });

    } finally {
      isLoading = false;
    }
  }

  /* ── Filter buttons ── */
  document.querySelectorAll(".filter-btn").forEach(btn => {
    btn.addEventListener("click", function () {
      if (this.dataset.category === currentCategory) return; // skip if same
      document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
      this.classList.add("active");
      currentCategory = this.dataset.category;
      renderProducts(currentCategory);
    });
  });

  /* ── Initial load ── */
  renderProducts();

});
</script>
</body>
</html>
