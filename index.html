<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
  // 🔥 PASTE YOUR FIREBASE CONFIG
  const firebaseConfig = {
    apiKey: "YOUR_KEY",
    authDomain: "YOUR_DOMAIN",
    projectId: "YOUR_ID"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  // Load products from Firebase
  function loadProducts() {
    return db.collection("stylehub_products").get().then(snapshot => {
      let products = [];
      snapshot.forEach(doc => {
        products.push({
          id: doc.id,
          ...doc.data()
        });
      });
      return products;
    });
  }

  // Filter buttons (UNCHANGED)
  const filterBtns = document.querySelectorAll(".filter-btn");
  filterBtns.forEach(btn => {
    btn.addEventListener("click", function () {
      filterBtns.forEach(b => b.classList.remove("active"));
      this.classList.add("active");
      renderProducts(this.dataset.category);
    });
  });

  // Render products (small async fix)
  async function renderProducts(category = "all") {
    const products = await loadProducts();
    const container = document.getElementById("products");
    container.innerHTML = "";

    const filtered = category === "all"
      ? products
      : products.filter(p => p.category === category);

    if (filtered.length === 0) {
      container.innerHTML = `<p style="grid-column: 1 / -1; text-align: center; color: #777;">No products available in this category.</p>`;
      return;
    }

    filtered.forEach(product => {
      const col = document.createElement("a");
      col.href = `product.html?id=${product.id}`;
      col.target = "_blank";
      col.classList.add("product");

      col.innerHTML = `
        <img class="product-img" src="${product.images[0]}" alt="${product.name}" />
        <div class="product-info">
          <div class="product-name">${product.name}</div>
          <div class="product-category">${product.category}</div>
          <div class="product-price">$${Number(product.price).toFixed(2)}</div>
        </div>
      `;

      container.appendChild(col);
    });
  }

  // Load on start
  renderProducts();
</script>
